name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs uv and caches its download/build cache between runs.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # uv provisions the Python pinned in .python-version automatically.
      # --locked fails the build if uv.lock is out of sync with pyproject.toml.
      - name: Install dependencies
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Check formatting (ruff)
        run: uv run ruff format --check .

      - name: Run tests (pytest)
        run: uv run pytest
